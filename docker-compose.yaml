name: matrino-app

services:
  matrino-api:
    container_name: matrino-api
    image: matrino-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - matrino-network
    deploy:
      resources:
        limits:
          memory: 2G

  matrino-front:
    container_name: matrino-front
    image: matrino-front:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL}
    environment:
      - API_URL=${API_URL}
    ports:
      - "${FRONTEND_PORT}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - matrino-network
    depends_on:
      matrino-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  matrino-network:
    driver: bridge
